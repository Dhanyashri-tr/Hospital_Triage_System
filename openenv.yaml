name: hospital-triage-env
description: AI-powered hospital patient prioritization system

tasks:
  - id: easy
    description: Basic severity-based prioritization

  - id: medium
    description: Severity + waiting time

  - id: hard
    description: Full triage with resource constraints

action_space:
  type: discrete
  values:
    - WAIT
    - MONITOR
    - TREAT_NOW

observation_space:
  severity: int
  waiting_time: int
  age: int
  resources_available: int
  condition: string